site_name: ML & AI Fundamentals
site_description: Полное руководство по основам машинного обучения и искусственного интеллекта
site_author: DaniilGavrin
repo_url: https://github.com/DaniilGavrin/ml-ai-fundamentals
repo_name: DaniilGavrin/ml-ai-fundamentals

theme:
  name: material
  language: ru
  palette:
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Главная: index.md
  
  - Основы ML:
    - Обзор раздела: fundamentals.md
    - Введение в ML: fundamentals/ml-basics.md
    - Подготовка данных: fundamentals/data-prep.md
    - Инженерия признаков: fundamentals/feature-engineering.md
    - Оценка моделей: fundamentals/model-evaluation.md
  
  - Нейронные сети:
    - Обзор раздела: neural-networks.md
    - Перцептрон: neural-networks/perceptron.md
    - Многослойные сети: neural-networks/multilayer.md
    - Функции активации: neural-networks/activation-functions.md
    - Обратное распространение: neural-networks/backpropagation.md
  
  - Глубокое обучение:
    - Обзор раздела: deep-learning.md
    - Сверточные сети (CNN): deep-learning/cnn.md
    - Рекуррентные сети (RNN): deep-learning/rnn.md
    - Трансформеры: deep-learning/transformers.md
    - Автоэнкодеры: deep-learning/autoencoders.md
  
  - Обработка данных:
    - Обзор раздела: data-processing.md
    - EDA: data-processing/eda.md
    - Визуализация: data-processing/visualization.md
    - Feature Engineering: data-processing/feature-engineering.md
  
  - Моделирование:
    - Обзор раздела: modeling.md
    - Классические алгоритмы: modeling/classical-algorithms.md
    - Ансамбли: modeling/ensembles.md
    - Оптимизация гиперпараметров: modeling/hyperparameter-tuning.md
  
  - Этика и безопасность:
    - Обзор раздела: ethics-security.md
    - Bias и Fairness: ethics-security/bias-fairness.md
    - Приватность: ethics-security/privacy.md
    - Безопасность ML: ethics-security/ml-security.md

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DaniilGavrin
